name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runner
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/jmc-hrd-app:latest
            ghcr.io/${{ env.OWNER }}/jmc-hrd-app:${{ github.event.release.tag_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: worker
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/jmc-hrd-worker:latest
            ghcr.io/${{ env.OWNER }}/jmc-hrd-worker:${{ github.event.release.tag_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
